# Example FeatureStore CR for prokube.
# Edit the namespace to match your Kubeflow profile.
#
# The operator will create:
#   - A Feast deployment + service (online feature server)
#   - PVCs for the SQLite registry and offline data store
#   - A ConfigMap (feast-<name>-client) with client connection info
#
# Prerequisites:
#   - feast-redis-config secret must exist in your namespace (see README)
apiVersion: feast.dev/v1
kind: FeatureStore
metadata:
  name: my-store
  namespace: <your-namespace>  # <-- change this
spec:
  feastProject: retail_features
  services:
    runFeastApplyOnInit: false
    securityContext:
      runAsUser: 0
    # The operator-generated registry Service has port name "http" and no
    # appProtocol. This misleads the SERVER-side envoy into classifying port
    # 6570 as HTTP/1.1. Bypassing server-side envoy interception entirely
    # (excludeInboundPorts) is the only workaround until the operator sets
    # appProtocol: grpc on its own Service. See feast-istio-workaround.yaml
    # for the client-side alt-Service + DestinationRule.
    podAnnotations:
      traffic.sidecar.istio.io/excludeInboundPorts: "6570"
    registry:
      local:
        # Expose the registry as a gRPC server so notebooks/clients can read
        # and write feature definitions remotely (production pattern).
        server: {}
        persistence:
          file:
            pvc:
              mountPath: /data/registry
              create:
                # storageClassName: default  # omit to use cluster default
                resources:
                  requests:
                    storage: 1Gi
    offlineStore:
      persistence:
        file:
          type: file
          pvc:
            mountPath: /data/offline
            create:
              storageClassName: mayastor-no-redundancy  # adjust for your cluster
              resources:
                requests:
                  storage: 10Gi
    onlineStore:
      persistence:
        store:
          type: redis
          secretRef:
            name: feast-redis-config
          secretKeyName: redis
