# Example FeatureStore CR for prokube.
# Edit the namespace to match your Kubeflow profile.
#
# The operator will create:
#   - A Feast deployment + service (online feature server)
#   - PVCs for the registry and offline data store
#   - A ConfigMap (feast-<name>-client) with client connection info
#
# Prerequisites:
#   - feast-redis-config secret must exist in your namespace (see README)
#
# Registry note:
#   The Feast operator CRD only supports a file-based local registry
#   (registry.local). It does not expose registry_type: sql in the CR spec.
#   The PVC below is identical either way — SQLite SQL is still just a file.
#   The notebook patches the SQLAlchemy engine directly to use SQL SQLite;
#   see feature_store.yaml and the notebook for details.
apiVersion: feast.dev/v1
kind: FeatureStore
metadata:
  name: my-store
  namespace: <your-namespace>  # <-- change this
spec:
  feastProject: retail_features
  services:
    runFeastApplyOnInit: false
    securityContext:
      runAsUser: 0
    registry:
      local:
        persistence:
          file:
            pvc:
              mountPath: /data/registry
              create:
                # storageClassName: default  # omit to use cluster default
                resources:
                  requests:
                    storage: 1Gi
    offlineStore:
      persistence:
        file:
          type: file
          pvc:
            mountPath: /data/offline
            create:
              storageClassName: mayastor-no-redundancy  # adjust for your cluster
              resources:
                requests:
                  storage: 10Gi
    onlineStore:
      persistence:
        store:
          type: redis
          secretRef:
            name: feast-redis-config
          secretKeyName: redis
