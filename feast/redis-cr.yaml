# Redis instance for Feast online store.
# Replace <your-namespace> with your Kubeflow profile namespace.
#
# Before applying, create the password secret:
#   kubectl create secret generic redis-feast \
#     -n <your-namespace> \
#     --from-literal=password=$(openssl rand -base64 24 | tr -d '/')
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-feast
  namespace: <your-namespace>  # <-- change this
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    redisSecret:
      name: redis-feast
      key: password
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
