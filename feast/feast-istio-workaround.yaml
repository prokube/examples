# Istio workaround for the Feast registry gRPC service.
#
# Root cause
# ----------
# The operator creates the registry Service with port name "http" and no
# appProtocol. This single omission misleads BOTH envoy sidecars:
#
#   CLIENT-side envoy: sees "http" → classifies traffic as HTTP/1.1,
#     downgrading gRPC (which requires HTTP/2).
#
#   SERVER-side envoy: builds its inbound listener for port 6570 from the
#     same Service → classifies port 6570 as HTTP/1.1 → receives gRPC
#     (HTTP/2) → sends RST ("protocol error").
#
# Three-part workaround (until operator sets appProtocol: grpc upstream)
# -----------------------------------------------------------------------
# 1. feast-cr.yaml: excludeInboundPorts: "6570"
#    Bypass the server-side envoy entirely for port 6570. Since the server
#    envoy's inbound listener is misconfigured (HTTP/1.1), we skip it so
#    gRPC reaches the feast container directly.
#
# 2. This file — alt-Service with appProtocol: grpc:
#    Fix the CLIENT-side envoy's protocol detection so it sends HTTP/2.
#
# 3. This file — DestinationRule tls: DISABLE:
#    Since the server-side envoy is bypassed (no mTLS termination), the
#    client must not attempt mTLS. Plain HTTP/2 goes directly to the
#    feast container.
#
# When the operator sets appProtocol: grpc on its own Service, all three
# workarounds become unnecessary: both envoys detect the protocol correctly
# and normal mTLS flows end-to-end.
#
# Usage
# -----
# Replace <name> with your FeatureStore CR name and <namespace> with your
# Kubeflow profile namespace, then apply:
#
#   sed 's/<name>/my-store/g; s/<namespace>/my-namespace/g' \
#     feast-istio-workaround.yaml | kubectl apply -f -
#
# In feature_store.yaml, point the registry at the alt-Service:
#
#   registry:
#     registry_type: remote
#     path: grpc://feast-<name>-registry-grpc.<namespace>.svc.cluster.local:80
#
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: feast-<name>-registry-grpc
  namespace: <namespace>
spec:
  selector:
    app: feast-<name>   # operator labels the feast-server pod with this
  ports:
    - name: grpc
      port: 80
      targetPort: 6570
      appProtocol: grpc
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: feast-<name>-registry-grpc
  namespace: <namespace>
spec:
  host: feast-<name>-registry-grpc.<namespace>.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
